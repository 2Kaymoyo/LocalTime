<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: rgba(15, 15, 19, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            color: #f2f3f5; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; padding: 40px; margin: 0; height: 100vh; box-sizing: border-box;
            -webkit-app-region: drag; 
        }
        
        .nav-bar { display: flex; gap: 20px; margin-bottom: 20px; position: relative; z-index: 50; -webkit-app-region: no-drag; }
        .nav-btn { background: none; border: none; color: #949ba4; font-size: 16px; font-weight: bold; cursor: pointer; transition: color 0.2s; }
        .nav-btn.active { color: #5865F2; } .nav-btn:hover { color: #f2f3f5; }
        .close-btn { position: absolute; top: 20px; right: 20px; z-index: 100; background: #F04747; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-weight: bold; cursor: pointer; -webkit-app-region: no-drag; }

        .page { display: none; height: calc(100% - 60px); } 
        .page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* PULSE UI */
        .header { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px;}
        .stat-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; width: 48%; display: flex; align-items: center; justify-content: space-between; border: 2px solid transparent; transition: all 0.3s; }
        .stat-card.active-mode { border: 2px solid #5865F2; background: rgba(88, 101, 242, 0.15); box-shadow: 0 0 20px rgba(88, 101, 242, 0.1); }
        .score-val { font-size: 42px; font-weight: 800; }
        .score-lbl { font-size: 11px; color: #949ba4; font-weight: bold; letter-spacing: 1px; }

        .session-btn { background: #5865F2; color: white; border: none; border-radius: 12px; padding: 14px 24px; font-weight: bold; font-size: 14px; cursor: pointer; display: block; width: 100%; margin-bottom: 20px; transition: all 0.2s ease; position: relative; z-index: 100; -webkit-app-region: no-drag; }
        .session-btn:active { transform: scale(0.98); opacity: 0.8; } .session-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .chart-container { position: relative; width: 260px; height: 260px; margin: 30px auto; border-radius: 50%; background: conic-gradient(#313244 0% 100%); transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .inner-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: #0f0f13; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        /* WEEKLY TRACKER UI */
        .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 300px; margin-top: 40px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .y-axis-group { display: flex; flex-direction: column; align-items: flex-end; width: 40px; }
        .y-axis-labels { height: 250px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; color: #949ba4; font-weight: bold; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 10px; width: 100%; text-align: right; }
        .y-axis-labels span { transform: translateY(5px); }
        .bar-group { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        .bar-container { display: flex; align-items: flex-end; gap: 4px; height: 250px; width: 100%; justify-content: center;}
        .bar { width: 16px; border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
        .bar.general { background: #949ba4; opacity: 0.6; }
        .bar.session { background: #43b581; }
        .day-label { font-size: 12px; color: #949ba4; font-weight: bold; }
        .page-title { font-size: 28px; font-weight: bold; margin-bottom: 5px; }

        /* --- TO-DO UI --- */
        .todo-container { overflow-y: auto; height: 100%; padding-right: 10px; -webkit-app-region: no-drag; padding-bottom: 80px;}
        .todo-container::-webkit-scrollbar { width: 6px; }
        .todo-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        
        .todo-category { margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .cat-title { font-size: 14px; font-weight: bold; color: #5865F2; margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        .cat-title.personal { color: #FAA61A; }
        .cat-title.professional { color: #43b581; }
        
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .todo-item:last-child { border-bottom: none; }
        .todo-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #5865F2; }
        .todo-text-wrap { flex: 1; display: flex; justify-content: space-between; align-items: center; }
        .todo-text { font-size: 15px; transition: all 0.2s; }
        .todo-text.done { text-decoration: line-through; color: #949ba4; }
        .todo-date-badge { font-size: 11px; color: #949ba4; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        
        .delete-btn { background: none; border: none; color: #949ba4; cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.2s; }
        .todo-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #F04747; }

        .add-todo-row { display: flex; gap: 10px; margin-top: 15px; }
        .todo-input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 15px; color: #f2f3f5; font-size: 14px; outline: none; transition: border 0.2s; }
        .todo-input:focus { border-color: #5865F2; }
        
        /* New Date Input Styling */
        .todo-date-input { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; color: #f2f3f5; font-size: 13px; outline: none; transition: border 0.2s; color-scheme: dark; }
        .todo-date-input:focus { border-color: #5865F2; }

        .add-btn { background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 8px; width: 45px; font-size: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .add-btn:hover { background: #5865F2; }
    </style>
</head>
<body>
    <button class="close-btn" onclick="window.close()">Close App</button>

    <div class="nav-bar">
        <button id="btn-pulse" class="nav-btn active">Pulse</button>
        <button id="btn-tasks" class="nav-btn">Tasks</button>
        <button id="btn-timeline" class="nav-btn">Weekly Tracker</button>
    </div>

    <div id="page-pulse" class="page active">
        <button id="session-toggle" class="session-btn">START FOCUS SESSION</button>
        <div class="header">
            <div id="card-general" class="stat-card active-mode">
                <div><div class="score-lbl">GENERAL MODE</div><div style="font-size: 10px; color: #949ba4; margin-top: 4px;">Standard tracking</div></div>
                <div id="gen-eff" class="score-val">0%</div>
            </div>
            <div id="card-session" class="stat-card">
                <div><div class="score-lbl">SESSION MODE</div><div style="font-size: 10px; color: #949ba4; margin-top: 4px;">Deep work only</div></div>
                <div id="ses-eff" class="score-val">0%</div>
            </div>
        </div>
        <div id="donut" class="chart-container">
            <div class="inner-circle">
                <div id="center-lbl" class="score-lbl" style="margin-bottom: 5px;">VIEWING: GENERAL</div>
                <div id="center-score" style="font-size: 54px; font-weight: 800;">0%</div>
                <div style="font-size: 11px; color: #949ba4; margin-top: 5px;">PRODUCTIVE</div>
            </div>
        </div>
    </div>

    <div id="page-tasks" class="page">
        <div class="page-title" style="margin-bottom: 20px;">Master To-Do List</div>
        <div class="todo-container">
            
            <div class="todo-category">
                <div class="cat-title">Academic</div>
                <div id="list-academic"></div>
                <div class="add-todo-row">
                    <input type="text" id="input-academic" class="todo-input" placeholder="e.g. Finish readings..." onkeypress="handleEnter(event, 'academic')">
                    <input type="date" id="date-academic" class="todo-date-input">
                    <button class="add-btn" onclick="addTodo('academic')">+</button>
                </div>
            </div>

            <div class="todo-category">
                <div class="cat-title professional">Professional</div>
                <div id="list-professional"></div>
                <div class="add-todo-row">
                    <input type="text" id="input-professional" class="todo-input" placeholder="e.g. Draft D.C. email..." onkeypress="handleEnter(event, 'professional')">
                    <input type="date" id="date-professional" class="todo-date-input">
                    <button class="add-btn" onclick="addTodo('professional')">+</button>
                </div>
            </div>

            <div class="todo-category">
                <div class="cat-title personal">Personal</div>
                <div id="list-personal"></div>
                <div class="add-todo-row">
                    <input type="text" id="input-personal" class="todo-input" placeholder="e.g. Log climbing route..." onkeypress="handleEnter(event, 'personal')">
                    <input type="date" id="date-personal" class="todo-date-input">
                    <button class="add-btn" onclick="addTodo('personal')">+</button>
                </div>
            </div>

        </div>
    </div>

    <div id="page-timeline" class="page">
        <div class="page-title">General vs. Focused</div>
        <div style="color: #949ba4; display: flex; gap: 20px; font-size: 12px; margin-top: 10px;">
            <div><span style="color:#949ba4;">■</span> General Efficiency</div><div><span style="color:#43b581;">■</span> Session Efficiency</div>
        </div>
        <div id="timeline-chart" class="bar-chart"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let isSessionActive = false;
        let todos = { academic: [], professional: [], personal: [] };

        // Bind Navigation
        document.getElementById('btn-pulse').addEventListener('click', () => switchPage('pulse'));
        document.getElementById('btn-timeline').addEventListener('click', () => switchPage('timeline'));
        document.getElementById('btn-tasks').addEventListener('click', () => switchPage('tasks'));
        document.getElementById('session-toggle').addEventListener('click', toggleSession);

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.getElementById(`btn-${pageId}`).classList.add('active');
            if (pageId === 'timeline') drawTimeline();
        }

        // --- TRACKER LOGIC ---
        async function toggleSession() {
            const btn = document.getElementById('session-toggle');
            btn.disabled = true; btn.innerText = "UPDATING SERVER...";
            const endpoint = isSessionActive ? '/session/stop' : '/session/start';
            try { 
                await fetch(`http://127.0.0.1:5050${endpoint}`, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: 'toggle' }); 
                await updateData(); 
            } catch (err) { btn.innerText = "ERROR - OFFLINE"; btn.style.background = "#F04747"; } finally { btn.disabled = false; }
        }

        function calculateEfficiency(dataObj) {
            if (!dataObj) return 0;
            const prod = (dataObj["Productive (School & Career)"] || 0) + (dataObj["Environmental Justice Work"] || 0);
            let total = 0; for (let key in dataObj) total += dataObj[key];
            return total > 0 ? Math.round((prod / total) * 100) : 0;
        }

        async function updateData() {
            try {
                const res = await fetch('http://127.0.0.1:5050/data');
                const result = await res.json();
                isSessionActive = result.session_active;
                
                const genEff = calculateEfficiency(result.general);
                const sesEff = calculateEfficiency(result.session_totals);
                const currentSesEff = calculateEfficiency(result.active_session);

                document.getElementById('gen-eff').innerText = genEff + '%';
                document.getElementById('ses-eff').innerText = sesEff + '%';
                
                const btn = document.getElementById('session-toggle');
                const cardGen = document.getElementById('card-general');
                const cardSes = document.getElementById('card-session');
                const donut = document.getElementById('donut');
                const centerScore = document.getElementById('center-score');
                const centerLbl = document.getElementById('center-lbl');

                document.title = isSessionActive ? `[F] ${currentSesEff}%` : `${genEff}%`;

                if (isSessionActive) {
                    btn.innerText = "STOP FOCUS SESSION"; btn.style.background = "#F04747";
                    cardGen.classList.remove('active-mode'); cardSes.classList.add('active-mode');
                    centerLbl.innerText = "CURRENT SESSION"; centerScore.innerText = currentSesEff + '%';
                    donut.style.background = `conic-gradient(#43b581 0% ${currentSesEff}%, #313244 ${currentSesEff}% 100%)`;
                } else {
                    btn.innerText = "START FOCUS SESSION"; btn.style.background = "#5865F2";
                    cardGen.classList.add('active-mode'); cardSes.classList.remove('active-mode');
                    centerLbl.innerText = "GENERAL TODAY"; centerScore.innerText = genEff + '%';
                    donut.style.background = `conic-gradient(#5865F2 0% ${genEff}%, #313244 ${genEff}% 100%)`;
                }
            } catch (error) {}
        }

        // --- TIMELINE LOGIC ---
        async function drawTimeline() {
            try {
                const res = await fetch('http://127.0.0.1:5050/history');
                const result = await res.json();
                const timeline = result.timeline || {};
                const dates = [];
                for(let i=6; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); dates.push(d.toISOString().split('T')[0]); }
                const container = document.getElementById('timeline-chart');
                
                container.innerHTML = `<div class="y-axis-group"><div class="y-axis-labels"><span>100%</span><span>75%</span><span>50%</span><span>25%</span><span>0%</span></div><div class="day-label" style="color:transparent;">--</div></div>`;
                
                dates.forEach(d => {
                    const dayData = timeline[d] || {};
                    const genEff = calculateEfficiency(dayData.general);
                    const sesEff = calculateEfficiency(dayData.session);
                    container.innerHTML += `
                        <div class="bar-group">
                            <div class="bar-container">
                                <div class="bar general" style="height: ${genEff}%;" title="General: ${genEff}%"></div>
                                <div class="bar session" style="height: ${sesEff}%;" title="Session: ${sesEff}%"></div>
                            </div>
                            <div class="day-label">${d.slice(-5)}</div>
                        </div>`;
                });
            } catch(e) {}
        }

        // --- TO-DO LIST LOGIC ---
        function setDateDefaults() {
            const today = new Date().toISOString().split('T')[0];
            ['academic', 'professional', 'personal'].forEach(cat => {
                document.getElementById(`date-${cat}`).value = today;
            });
        }

        async function fetchTodos() {
            try {
                const res = await fetch('http://127.0.0.1:5050/todos');
                todos = await res.json();
                renderTodos();
            } catch(e) {}
        }

        async function saveTodos() {
            try { await fetch('http://127.0.0.1:5050/todos', { method: 'POST', body: JSON.stringify(todos) }); } 
            catch(e) {}
        }

        function renderTodos() {
            ['academic', 'professional', 'personal'].forEach(cat => {
                const list = document.getElementById(`list-${cat}`);
                list.innerHTML = '';
                todos[cat].forEach((task, index) => {
                    list.innerHTML += `
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" ${task.done ? 'checked' : ''} onchange="toggleTodo('${cat}', ${index})">
                            <div class="todo-text-wrap">
                                <span class="todo-text ${task.done ? 'done' : ''}">${task.text}</span>
                                <span class="todo-date-badge">${task.dueDate || 'No Date'}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteTodo('${cat}', ${index})">✕</button>
                        </div>
                    `;
                });
            });
        }

        function addTodo(cat) {
            const input = document.getElementById(`input-${cat}`);
            const dateInput = document.getElementById(`date-${cat}`);
            const text = input.value.trim();
            
            let dateVal = dateInput.value;
            if (!dateVal) dateVal = new Date().toISOString().split('T')[0]; // Fallback to today

            if (text === '') return;
            todos[cat].push({ text: text, done: false, dueDate: dateVal });
            input.value = '';
            dateInput.value = new Date().toISOString().split('T')[0]; // Reset UI to today
            renderTodos();
            saveTodos();
        }

        function handleEnter(e, cat) {
            if (e.key === 'Enter') addTodo(cat);
        }

        window.toggleTodo = function(cat, index) {
            todos[cat][index].done = !todos[cat][index].done;
            renderTodos(); saveTodos();
        };

        window.deleteTodo = function(cat, index) {
            todos[cat].splice(index, 1);
            renderTodos(); saveTodos();
        };
        window.addTodo = addTodo;
        window.handleEnter = handleEnter;

        // Boot
        setDateDefaults();
        fetchTodos();
        updateData(); setInterval(updateData, 5000);
    </script>
</body>
</html>
